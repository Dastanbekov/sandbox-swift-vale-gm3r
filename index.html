<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICPC Event – International Collegiate Programming Contest</title>
  <meta name="description" content="Official website for the ICPC (International Collegiate Programming Contest) event. Learn about the competition, schedule, and how to participate.">
  <meta name="keywords" content="ICPC, programming contest, collegiate programming, competitive programming, algorithm competition, ICPC event">
  <meta name="author" content="ICPC Organizers">
  <meta property="og:title" content="ICPC Event – International Collegiate Programming Contest">
  <meta property="og:description" content="Official website for the ICPC (International Collegiate Programming Contest) event. Learn about the competition, schedule, and how to participate.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://icpc.example.com">
  <meta property="og:image" content="https://icpc.example.com/images/hero-bg.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://icpc.example.com">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navigation (placeholder) -->
  <nav>
    <div class="nav-toggle" aria-expanded="false">&#9776;</div>
    <ul class="nav-menu">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Home section -->
  <section id="home">
    <h1>Welcome to ICPC</h1>
    <div id="countdown">
      <span id="days"></span> days
      <span id="hours"></span> hours
      <span id="minutes"></span> minutes
      <span id="seconds"></span> seconds
    </div>
    <div id="countdown-message"></div>
  </section>

  <!-- About section -->
  <section id="about">
    <h2>About</h2>
    <p>Information about the event.</p>
  </section>

  <!-- Contact section -->
  <section id="contact">
    <h2>Contact Us</h2>
    <form id="contact-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <span class="error" id="name-error"></span>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <span class="error" id="email-error"></span>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
        <span class="error" id="message-error"></span>
      </div>
      <button type="submit">Send</button>
      <div id="form-message"></div>
    </form>
  </section>

  <script src="main.js"></script>
</body>
</html>
